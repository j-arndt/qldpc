name: lean-proofs
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Cache mathlib
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
      - name: Get mathlib cache
        run: lake exe cache get
      - name: Build all proofs (zero errors, zero sorries policy)
        run: |
          lake build 2>&1 | tee build.log
          ! grep -E "declaration uses 'sorry'|declaration uses \`sorry\`" build.log
      - name: Axiom audit (standard axioms only)
        run: |
          lake build proofs.AxiomAudit 2>&1 | tee audit.log
          ! grep "depends on axioms" audit.log | grep -vE "\[propext(, Classical\.choice)?(, Quot\.sound)?\]"
